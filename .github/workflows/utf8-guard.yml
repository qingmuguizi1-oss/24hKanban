name: UTF-8 Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  utf8-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run UTF-8 guard
        run: git ls-files -z | node scripts/check-utf8.js --stdin-null
