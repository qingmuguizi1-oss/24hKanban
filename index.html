﻿<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24h任务效率看板</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="global-menu" id="global-menu">
    <button id="menu-toggle-btn" type="button" class="secondary">菜单</button>
    <div id="menu-dropdown" class="menu-dropdown is-hidden" role="menu" aria-label="全局菜单">
      <div class="menu-account-block">
        <p class="menu-account-label">当前账号</p>
        <p id="menu-account-value" class="menu-account-value">未登录</p>
      </div>
      <div class="menu-divider" aria-hidden="true"></div>
      <button id="menu-auth-btn" type="button" class="menu-action-btn" role="menuitem">登录</button>
    </div>
  </div>

  <section id="login-page" class="login-page is-hidden" aria-hidden="true">
    <div class="login-quote-wrap">
      <div class="login-logo-shell">
        <img id="login-logo" src="images/jieyou-logo.jpg" alt="JIEYOU Logo" class="login-logo">
        <div id="login-logo-fallback" class="login-logo-fallback is-hidden">LOGO</div>
      </div>
      <p id="daily-quote-text" class="daily-quote-text"></p>
      <p id="daily-quote-source" class="daily-quote-source"></p>
    </div>

    <section class="login-card" aria-label="邮箱验证码登录">
      <button id="login-close-btn" type="button" class="secondary login-close-btn" aria-label="关闭登录窗口">×</button>
      <header class="login-head">
        <h1>验证码登录</h1>
        <p>无需记忆密码，使用邮箱验证码快捷登录</p>
      </header>

      <form id="login-form" class="login-form" novalidate>
        <label class="login-field">
          <span>邮箱地址</span>
          <div class="login-input-wrap">
            <span class="login-mail-icon">✉</span>
            <input id="login-email" type="email" placeholder="your-email@example.com" autocomplete="email">
          </div>
        </label>

        <label id="login-code-field" class="login-field is-hidden">
          <span>验证码</span>
          <input id="login-code" type="text" placeholder="输入6位验证码" maxlength="6" inputmode="numeric">
        </label>

        <div id="login-message" class="login-message is-hidden" role="status" aria-live="polite"></div>

        <div class="login-actions">
          <button id="login-send-btn" type="button">发送验证码</button>
          <div id="login-auth-actions" class="is-hidden">
            <button id="login-submit-btn" type="submit">确认登录</button>
            <button id="login-resend-btn" type="button" class="secondary">没有收到？重新发送</button>
          </div>
        </div>
      </form>

      <footer class="login-footnote">未注册的邮箱将自动创建账号</footer>
    </section>
  </section>

  <main id="main-app" class="app">
    <header class="app-header">
      <h1>24h任务效率看板</h1>
      <p>按时间记录任务，清晰看到每天每一段时间都在做什么。</p>
    </header>

    <section class="panel form-panel">
      <h2>新建 / 编辑任务</h2>
      <form id="task-form" novalidate>
        <input type="hidden" id="task-id">

        <label>
          任务名称
          <input id="task-name" type="text" maxlength="50" placeholder="例如：完成需求评审" required>
        </label>

        <label>
          任务标签（四象限）
          <select id="task-priority" required>
            <option value="important_urgent">&#x1F525; &#37325;&#35201;&#19988;&#32039;&#24613;</option>
            <option value="important_not_urgent" selected>&#x1F3AF; &#37325;&#35201;&#19981;&#32039;&#24613;</option>
            <option value="not_important_urgent">&#x26A1; &#19981;&#37325;&#35201;&#20294;&#32039;&#24613;</option>
            <option value="not_important_not_urgent">&#x1F9CA; &#19981;&#37325;&#35201;&#20063;&#19981;&#32039;&#24613;</option>
          </select>
          <div id="task-importance-wrapper" class="importance-level-group is-hidden">
            <span class="importance-level-label">重要程度</span>
            <div class="importance-level-options" role="radiogroup" aria-label="importance-levels">
              <label class="importance-level-item"><input type="radio" name="task-importance-level" value="level1"><span>1级</span></label>
              <label class="importance-level-item"><input type="radio" name="task-importance-level" value="level2" checked><span>2级</span></label>
              <label class="importance-level-item"><input type="radio" name="task-importance-level" value="level3"><span>3级</span></label>
              <label class="importance-level-item"><input type="radio" name="task-importance-level" value="level4"><span>4级</span></label>
            </div>
          </div>
          <div id="task-urgent-wrapper" class="importance-level-group is-hidden">
            <span class="importance-level-label">紧急程度</span>
            <div class="importance-level-options" role="radiogroup" aria-label="urgent-levels">
              <label class="importance-level-item"><input type="radio" name="task-urgent-level" value="urgent1"><span>1级</span></label>
              <label class="importance-level-item"><input type="radio" name="task-urgent-level" value="urgent2"><span>2级</span></label>
              <label class="importance-level-item"><input type="radio" name="task-urgent-level" value="urgent3" checked><span>3级</span></label>
            </div>
          </div>
        </label>

        <label>
          任务详情（选填）
          <textarea id="task-detail" maxlength="200" rows="3" placeholder="简要描述目标、输出和限制条件"></textarea>
          <small id="detail-count">0/200</small>
        </label>

        <div class="two-col">
          <label>
            开始时间
            <input id="task-start" type="datetime-local" required>
          </label>
          <label>
            结束时间
            <input id="task-end" type="datetime-local" required>
          </label>
        </div>

        <div class="two-col">
          <div class="category-group">
            <span class="group-label">任务类别（可多选）</span>
            <details id="task-category-picker" class="category-picker">
              <summary id="task-category-summary" class="category-summary is-empty">请选择任务类别</summary>
              <div class="category-checklist" id="task-category-group">
                <label class="category-item"><input type="checkbox" name="task-categories" value="work"><span>&#x1F4BC; &#24037;&#20316;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="explore"><span>&#x1F6A2; &#25506;&#32034;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="topic"><span>&#x1F4DA; &#35838;&#39064;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="dev"><span>&#x1F4BB; &#24320;&#21457;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="inspiration"><span>&#x1F4A1; &#28789;&#24863;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="relax"><span>&#x1F9D8; &#25918;&#26494;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="sleep"><span>&#x1F634; &#30561;&#35273;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="meal"><span>&#x1F37D; &#29992;&#39184;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="record"><span>&#x1F4DD; &#35760;&#24405;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="entertainment"><span>&#x1F3AE; &#23089;&#20048;</span></label>
                <label class="category-item"><input type="checkbox" name="task-categories" value="other"><span>&#x1F9E9; &#20854;&#20182;</span></label>
              </div>
            </details>
          </div>

          <label>
            状态
            <select id="task-status" required>
              <option value="todo">🕓 未开始</option>
              <option value="doing">⏳ 进行中</option>
              <option value="done">✅ 已完成</option>
            </select>
          </label>
        </div>

        <p class="duration-preview">总用时：<strong id="duration-preview">--</strong></p>

        <div class="actions">
          <button type="submit">保存任务</button>
          <button type="button" id="reset-form" class="secondary">重置</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>每日24h分配</h2>
        <div class="head-tools">
          <div id="allocation-mode-switch" class="view-switch" role="group" aria-label="分配时间范围">
            <button type="button" id="mode-day" class="switch-btn is-active">天</button>
            <button type="button" id="mode-week" class="switch-btn">周</button>
          </div>
          <div id="allocation-view-switch" class="view-switch" role="group" aria-label="分配展示方式">
            <button type="button" id="view-timeline" class="switch-btn is-active">时间切片图</button>
            <button type="button" id="view-pie" class="switch-btn">饼图视图</button>
          </div>
          <label id="allocation-date-label">
            查看日期
            <input id="selected-date" type="date">
            <span id="selected-week" class="selected-week is-hidden">第--周</span>
          </label>
        </div>
      </div>

      <div class="summary-row">
        <div class="summary-item">
          <span>已记录时长</span>
          <strong id="summary-used">0h 0m</strong>
        </div>
        <div class="summary-item">
          <span>空余时长</span>
          <strong id="summary-free">24h 0m</strong>
        </div>
      </div>

      <div id="week-wrapper" class="week-wrapper is-hidden">
        <div id="week-bars" class="week-bars"></div>
        <div id="week-bars-scroll" class="week-bars-scroll is-hidden">
          <input
            id="week-bars-scroll-range"
            class="week-bars-scroll-range"
            type="range"
            min="0"
            max="0"
            value="0"
            step="1"
            aria-label="周模式类别排行横向滑动"
          >
        </div>
      </div>
      <div id="timeline" class="timeline"></div>
      <div id="timeline-legend" class="legend"></div>
      <div id="pie-wrapper" class="pie-wrapper is-hidden">
        <div class="pie-chart-wrap">
          <div id="task-pie" class="task-pie"></div>
          <div id="task-pie-center" class="task-pie-center">0%</div>
          <div id="pie-tooltip" class="pie-tooltip is-hidden"></div>
        </div>
        <div id="pie-legend" class="pie-legend"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>任务看板</h2>
        <label>
          查看日期
          <input id="board-date" type="date">
        </label>
      </div>

      <div class="board">
        <div class="column">
          <h3 class="column-head">
            <span class="column-title">🕓 未开始</span>
            <span id="count-todo" class="column-count">0</span>
          </h3>
          <div id="col-todo" class="card-list"></div>
          <button type="button" class="column-add secondary" data-quick-status="todo" aria-label="在未开始中新增任务">+</button>
        </div>

        <div class="column">
          <h3 class="column-head">
            <span class="column-title">⏳ 进行中</span>
            <span id="count-doing" class="column-count">0</span>
          </h3>
          <div id="col-doing" class="card-list"></div>
          <button type="button" class="column-add secondary" data-quick-status="doing" aria-label="在进行中新增任务">+</button>
        </div>

        <div class="column">
          <h3 class="column-head">
            <span class="column-title">✅ 已完成</span>
            <span id="count-done" class="column-count">0</span>
          </h3>
          <div id="col-done" class="card-list"></div>
          <button type="button" class="column-add secondary" data-quick-status="done" aria-label="在已完成中新增任务">+</button>
        </div>
      </div>
    </section>
  </main>

  <template id="task-card-template">
    <article class="task-card is-collapsed">
      <div class="task-card-head">
        <div class="card-title-wrap">
          <h4 class="card-title"></h4>
          <span class="card-time-range"></span>
        </div>
        <button type="button" class="card-toggle secondary" aria-expanded="false">展开</button>
      </div>
      <p class="pill priority-pill"></p>
      <p class="card-detail"></p>
      <div class="card-extra">
        <p class="card-line"><span>开始：</span><span class="card-start"></span></p>
        <p class="card-line"><span>结束：</span><span class="card-end"></span></p>
        <p class="card-line"><span>总用时：</span><span class="card-duration"></span></p>
        <p class="card-line"><span>类别：</span><span class="card-category"></span></p>
        <label class="card-line">
          <span>状态：</span>
          <select class="card-status">
            <option value="todo">🕓 未开始</option>
            <option value="doing">⏳ 进行中</option>
            <option value="done">✅ 已完成</option>
          </select>
        </label>
        <div class="card-actions">
          <button class="card-edit secondary">编辑</button>
          <button class="card-delete danger">删除</button>
        </div>
      </div>
    </article>
  </template>

  <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
  <script src="app.js?v=20260309-1"></script>
</body>
</html>
